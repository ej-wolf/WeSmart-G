# Example config for scripts/rtsp_yolo_pose_multistream.py.
# Keep real RTSP credentials in a local, uncommitted YAML file.

streams:
  - id: test_01
    display_name: WS Office 1
    enabled: true
    # tms_tags: ['slow']
    #  url: "/mnt/local-data/Projects/Wesmart/Video-datasets/wesmart/fight_out_predict_SLOWFAST.mp4"
    url: "/mnt/local-data/Python/Projects/weSmart/data/video/testing-streams/Russian_Road_Rage- Micky_Mouse_&_Sponge_Bob.mp4"
  - id: test_02
    display_name: WS Office 2
    enabled: false
    # url: "/mnt/local-data/Python/Projects/weSmart/data/video/testing-streams/F_wesmart_demo.mp4"
    url: "/mnt/local-data/Python/Projects/weSmart/data/video/testing-streams/F_141_0_0_0_0.mp4"
    tms_tags: ['fast']
  - id: office_03
    display_name: FightClub
    enabled: false
    # url: ""
    url: "/mnt/local-data/Projects/Wesmart/Video-datasets/misc/Fight.Club.10th.Anniversary.Edition.1999.1080p.BrRip.x264.YIFY.mp4"
  - id: office_04
    display_name: Office 4
    enabled: false
    url: "rtsp://root:Ab123456!@192.168.0.49:554/axis-media/media.amp?videocodec=h264"

model:
  yolo_pose: "models/yolo26x-pose.pt"
  conf: 0.5
  imgsz: 736
  half: true
  ignored_classes: [3, 4]

runtime:
  device: "cuda:0"
  max_batch_size: 8
  poll_sleep_sec: 0.005
  status_interval_sec: 5.0

capture:
  # backend: "ffmpeg"
  backend: "any"
  reconnect_delay_sec: 1.0
  read_sleep_sec: 0.0
  loop_files: true
  play_in_realtime: true

sampling:
  #* auto prefers sample_period_sec or tcn.training_config data fps/step.
  #* For live RTSP, time-based sampling is usually better than frame modulo.
  # mode: "auto"
  # step_frames: 5
  # sample_period_sec: 0.
  mode: "frames"
  step_frames: 5
  window_size: 8

tcn:
  enabled: false

tms:
  payload_span: 8.0
  payload_tolerance: 0.05
  models:
    - tag: slow
      model: "models/tsm/slow_lse_w3p6_e143.pt"
      enabled: true
      pooling: "lse"
      threshold: 0.5
      abnormal_tsh: 0.45
      #violence_tsh: 0.75
      window_span: 3.6
      T_infer: 1.8
      min_frames: 10

    - tag: fast
      model: "models/tsm/fast_mm_w1p2_e125.pt"
      enabled: true
      pooling: "mm"
      threshold: 0.55
      abnormal_tsh: 0.45
      window_span: 1.2
      T_infer: 0.5
      min_frames: 4

display:
  enabled: true
  window_name: "rtsp_yolo_pose_stream"
  fps: 10
  columns: 1
  tile_width: 640
  tile_height: 360
  #* Optional final dashboard limit. Useful when many tiles exceed screen size.
  # max_width: 1280
  # max_height: 720
  show_boxes: true
  show_keypoints: true
  show_skeleton: true
  show_status: true
  keypoint_conf: 0.25

output:
  # Set this to a directory if you want one JSON file per stream with the
  # latest TCN-ready frame and rolling window.
  latest_payload_dir:
